name: Naturista
options:
  bundleIdPrefix: com.naturista
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  # mlx-swift-lm hosts the reusable LLM/VLM libraries that used to live
  # in mlx-swift-examples. We need MLXVLM (Gemma 3/4 image support) and
  # MLXLMCommon (the shared inference plumbing) for the native Gemma
  # identifier — see docs/superpowers/specs/2026-05-03-gemma-native-port-phase-1a-design.md.
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.3"
  # swift-transformers provides the HuggingFace tokenizer / chat-template
  # loader that MLXLMCommon's TokenizerLoader protocol expects. The native
  # Gemma identifier wraps Tokenizers.AutoTokenizer.from(modelFolder:) for
  # the local mlx-community weights.
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"
  # flux-2-swift-mlx provides Flux2Core — the in-process FLUX.2 Klein 4B
  # int4 pipeline validated by flux2_swift_spike/. Replaces the mflux
  # subprocess. Pinned to 2.1.0, the version the spike measured against.
  flux-2-swift-mlx:
    url: https://github.com/VincentGourbin/flux-2-swift-mlx
    from: "2.1.0"

settings:
  base:
    PRODUCT_NAME: Naturista
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Naturista:
    type: application
    platform: macOS
    sources:
      - path: ../Sources
        type: group
      - path: ../Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.naturista.app
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Naturista
        CFBundleDisplayName: Naturista
        CFBundleIdentifier: com.naturista.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Naturista
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.nature
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    entitlements:
      path: Resources/Naturista.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        # FLUX + Gemma weights are pulled from huggingface.co on first
        # use of an uninstalled model; without this the URLSession
        # downloads in HuggingFaceDownloader / Flux2ModelDownloader fail.
        com.apple.security.network.client: true
    dependencies:
      - package: GRDB
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXVLM
      - package: swift-transformers
        product: Tokenizers
      - package: flux-2-swift-mlx
        product: Flux2Core
      - package: flux-2-swift-mlx
        product: FluxTextEncoders

schemes:
  Naturista:
    build:
      targets:
        Naturista: all
    run:
      config: Debug